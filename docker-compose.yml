version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gooddoctor-postgres
    restart: always
    environment:
      POSTGRES_USER: gooddoctor_user
      POSTGRES_PASSWORD: gooddoctor_password
      POSTGRES_DB: gooddoctor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gooddoctor-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gooddoctor.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
